<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加密交易所推广 | JonnhEB</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --card: #0c1120;
    --border: #1a2540;
    --accent1: #00f0ff;
    --accent2: #ff00c8;
    --accent3: #7b2fff;
    --text: #e0eaff;
    --muted: #4a5980;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .blob1 { width: 400px; height: 400px; background: rgba(123,47,255,0.15); top: -100px; left: -100px; }
  .blob2 { width: 350px; height: 350px; background: rgba(0,240,255,0.08); bottom: 0; right: -80px; }
  .blob3 { width: 250px; height: 250px; background: rgba(255,0,200,0.08); top: 40%; left: 50%; transform: translateX(-50%); }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 60px 24px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .avatar-wrap {
    position: relative;
    margin-bottom: 20px;
    animation: fadeDown 0.8s ease both;
  }

  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent3), var(--accent1));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    color: #fff;
    position: relative;
    z-index: 1;
  }

  .avatar-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: conic-gradient(var(--accent1), var(--accent2), var(--accent3), var(--accent1));
    animation: spin 4s linear infinite;
    z-index: 0;
  }

  .avatar-ring::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: var(--bg);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .name {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    text-align: center;
    animation: fadeDown 0.8s 0.1s ease both;
  }

  .bio {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 40px;
    line-height: 1.6;
    animation: fadeDown 0.8s 0.2s ease both;
  }

  .section-label {
    width: 100%;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-left: 4px;
    animation: fadeUp 0.6s 0.25s ease both;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }

  .link-item {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    text-decoration: none;
    color: var(--text);
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
    animation: fadeUp 0.7s ease both;
  }

  .link-item:nth-child(1) { animation-delay: 0.3s; }
  .link-item:nth-child(2) { animation-delay: 0.42s; }
  .link-item:nth-child(3) { animation-delay: 0.54s; }
  .link-item:nth-child(4) { animation-delay: 0.66s; }

  .link-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }
  .link-item:hover::before { transform: translateX(100%); }
  .link-item:hover { transform: translateY(-2px) scale(1.01); }
  .link-item:active { transform: scale(0.98); }

  .link-accent {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 14px 0 0 14px;
  }

  .link-logo {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    font-weight: 900;
    font-family: 'Orbitron', monospace;
    letter-spacing: 0;
  }

  .link-text {
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .link-title {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .link-desc {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .link-badge {
    font-size: 10px;
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  /* Binance */
  .binance .link-accent { background: linear-gradient(180deg, #F0B90B, #e07800); }
  .binance .link-logo { background: rgba(240,185,11,0.12); color: #F0B90B; }
  .binance:hover { border-color: #F0B90B; box-shadow: 0 0 24px rgba(240,185,11,0.2), 0 4px 20px rgba(0,0,0,0.4); }
  .binance .link-badge { background: rgba(240,185,11,0.12); color: #F0B90B; border: 1px solid rgba(240,185,11,0.3); }

  /* OKX */
  .okx .link-accent { background: linear-gradient(180deg, #00f0ff, #0060ff); }
  .okx .link-logo { background: rgba(0,240,255,0.1); color: var(--accent1); }
  .okx:hover { border-color: var(--accent1); box-shadow: 0 0 24px rgba(0,240,255,0.2), 0 4px 20px rgba(0,0,0,0.4); }
  .okx .link-badge { background: rgba(0,240,255,0.1); color: var(--accent1); border: 1px solid rgba(0,240,255,0.3); }

  /* Gate */
  .gate .link-accent { background: linear-gradient(180deg, #00e676, #00b0ff); }
  .gate .link-logo { background: rgba(0,230,118,0.1); color: #00e676; }
  .gate:hover { border-color: #00e676; box-shadow: 0 0 24px rgba(0,230,118,0.2), 0 4px 20px rgba(0,0,0,0.4); }
  .gate .link-badge { background: rgba(0,230,118,0.1); color: #00e676; border: 1px solid rgba(0,230,118,0.3); }

  /* Bitget */
  .bitget .link-accent { background: linear-gradient(180deg, #7b2fff, #ff00c8); }
  .bitget .link-logo { background: rgba(123,47,255,0.12); color: #a56fff; }
  .bitget:hover { border-color: #7b2fff; box-shadow: 0 0 24px rgba(123,47,255,0.25), 0 4px 20px rgba(0,0,0,0.4); }
  .bitget .link-badge { background: rgba(123,47,255,0.12); color: #a56fff; border: 1px solid rgba(123,47,255,0.3); }

  /* Twitter */
  .contact-section {
    width: 100%;
    animation: fadeUp 0.7s 0.75s ease both;
  }

  .twitter-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(29,161,242,0.07);
    border: 1px solid rgba(29,161,242,0.25);
    border-radius: 14px;
    padding: 16px 20px;
    text-decoration: none;
    color: #1DA1F2;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .twitter-btn:hover {
    background: rgba(29,161,242,0.12);
    border-color: #1DA1F2;
    transform: translateY(-2px);
    box-shadow: 0 0 24px rgba(29,161,242,0.2);
  }

  .twitter-icon {
    width: 44px;
    height: 44px;
    background: rgba(29,161,242,0.12);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .twitter-icon svg { width: 22px; height: 22px; fill: #1DA1F2; }

  .tw-title {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 3px;
    color: #1DA1F2;
  }
  .tw-desc { font-size: 13px; color: #4a7fa0; }

  .footer {
    margin-top: 50px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.4;
    animation: fadeUp 0.7s 0.9s ease both;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 999;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
